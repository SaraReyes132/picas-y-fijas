<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picas y Fijas - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            border: none;
            width: 100%;
            max-width: 420px;
        }
        .card-header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 30px 20px 20px;
            text-align: center;
            border-radius: 15px 15px 0 0;
        }
        .card-body {
            padding: 30px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-outline-secondary {
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
        }
        .alert {
            border-radius: 10px;
        }
        .avatar-option {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            object-fit: cover;
            background: #ecf0f1;
        }
        .avatar-option.selected {
            border: 3px solid #667eea;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h2 class="mb-1">🎯 Picas y Fijas</h2>
        <p class="text-muted mb-0">Juego de lógica y deducción</p>
    </div>

    <div class="card-body">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/registro}" th:object="${jugador}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre de usuario</label>
                <input type="text"
                       class="form-control"
                       th:field="*{username}"
                       placeholder="Ingresa tu nombre"
                       autocomplete="off"
                       required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Elige tu avatar</label>
                <div class="d-flex justify-content-center gap-3" id="avatarSelector">
                    <img th:each="avatar : ${avatares}"
                         th:src="@{/avatares/{name}(name=${avatar})}"
                         class="avatar-option"
                         th:data-avatar="${avatar}"
                         onclick="seleccionarAvatar(this)">
                </div>
                <input type="hidden" th:field="*{avatar}" id="avatarInput">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('avatar')}" th:errors="*{avatar}"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-2">
                ¡Jugar Ahora!
            </button>

            <a th:href="@{/ranking}" class="btn btn-outline-secondary w-100">
                Ver Ranking
            </a>
        </form>
    </div>
</div>

<script>
    function seleccionarAvatar(img) {
        // Quitar clase 'selected' de todos
        document.querySelectorAll('.avatar-option').forEach(i => i.classList.remove('selected'));
        // Agregar clase al seleccionado
        img.classList.add('selected');
        // Asignar el nombre del archivo al campo oculto
        document.getElementById('avatarInput').value = img.getAttribute('data-avatar');
    }
</script>
</body>
</html>
